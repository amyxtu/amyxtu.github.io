<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 376" role="img" aria-label="A loaded barbell">
  <defs>
    <radialGradient id="bg" cx="50%" cy="20%" r="90%">
      <stop offset="0%" stop-color="#f2f0ee"/>
      <stop offset="100%" stop-color="#e5e2df"/>
    </radialGradient>
  </defs>
  <rect width="620" height="376" fill="url(#bg)"/>

  <ellipse cx="310" cy="290" rx="230" ry="14" fill="#3d332b" opacity="0.07"/>

  <!-- bar -->
  <rect x="70" y="180" width="480" height="14" rx="7" fill="#7a6f64"/>
  <!-- collars -->
  <rect x="196" y="174" width="12" height="26" rx="4" fill="#5f564d"/>
  <rect x="412" y="174" width="12" height="26" rx="4" fill="#5f564d"/>

  <!-- left plates -->
  <rect x="168" y="120" width="26" height="134" rx="10" fill="#93857a"/>
  <rect x="140" y="134" width="24" height="106" rx="10" fill="#a99c8f"/>
  <rect x="116" y="150" width="20" height="74" rx="9" fill="#b3a698"/>

  <!-- right plates -->
  <rect x="426" y="120" width="26" height="134" rx="10" fill="#93857a"/>
  <rect x="456" y="134" width="24" height="106" rx="10" fill="#a99c8f"/>
  <rect x="484" y="150" width="20" height="74" rx="9" fill="#b3a698"/>

  <!-- heartbeat line -->
  <path d="M180 300 L268 300 L286 274 L306 322 L322 288 L332 300 L440 300"
        fill="none" stroke="#93857a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
</svg>
